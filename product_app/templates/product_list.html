<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<h2>Product List</h2>
<a href="/add/">Add Product</a>

<ul>
{% for product in products %}
    <li>
        {{ product.name }} - {{ product.price }} - {{ product.description }}
        <a href="/update/{{ product.id }}/">Edit</a>
        <a href="/delete/{{ product.id }}/">Delete</a>
    </li>
{% endfor %}
</ul>
</body>
</html>
